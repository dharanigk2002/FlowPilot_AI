spring:
  application:
    name: flowpilot-backend
  main:
    banner-mode: off
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flowpilot}
    username: ${DATABASE_USERNAME:flowpilot}
    password: ${DATABASE_PASSWORD:flowpilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    model:
      chat: ${AI_CHAT_MODEL:ollama}
      embedding: ${AI_EMBEDDING_MODEL:ollama}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.2}
        temperature: 0.1
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
          temperature: 0.1
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      type: ${AI_VECTOR_STORE:pgvector}
      pgvector:
        initialize-schema: false
        table-name: ${VECTOR_STORE_TABLE:document_chunks_ollama}
        dimensions: ${EMBEDDING_DIMENSIONS:768}
        index-type: HNSW
        distance-type: COSINE_DISTANCE

app:
  ai:
    rag:
      top-k: 5
      similarity-threshold: 0.65
  knowledge:
    max-file-size-bytes: 10485760
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    auth-cookie:
      name: ${AUTH_COOKIE_NAME:FLOWPILOT_ACCESS_TOKEN}
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    jwt:
      secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: warn

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
