spring:
  application:
    name: flowpilot-backend
  main:
    banner-mode: off
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flowpilot}
    username: ${DATABASE_USERNAME:flowpilot}
    password: ${DATABASE_PASSWORD:flowpilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: warn

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
