spring:
  application:
    name: flowpilot-backend
  main:
    banner-mode: off
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flowpilot}
    username: ${DATABASE_USERNAME:flowpilot}
    password: ${DATABASE_PASSWORD:flowpilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    model:
      chat: ${AI_CHAT_MODEL:none}
      embedding: ${AI_EMBEDDING_MODEL:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      type: ${AI_VECTOR_STORE:none}
      pgvector:
        initialize-schema: false
        table-name: document_chunks
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE

app:
  knowledge:
    max-file-size-bytes: 10485760
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: warn

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
