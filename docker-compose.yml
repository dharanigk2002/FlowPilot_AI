services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: flowpilot-postgres
    environment:
      POSTGRES_DB: flowpilot
      POSTGRES_USER: flowpilot
      POSTGRES_PASSWORD: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - flowpilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpilot -d flowpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flowpilot_postgres_data:
