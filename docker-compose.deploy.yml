services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: flowpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowpilot}
      POSTGRES_USER: ${POSTGRES_USER:-flowpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowpilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - flowpilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowpilot} -d ${POSTGRES_DB:-flowpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: flowpilot-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - flowpilot_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10

  ollama-models:
    image: ollama/ollama:latest
    container_name: flowpilot-ollama-models
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: >
      sh -c "ollama pull ${OLLAMA_CHAT_MODEL:-llama3.2}
      && ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
    depends_on:
      ollama:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: flowpilot-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flowpilot}
      DATABASE_USERNAME: ${POSTGRES_USER:-flowpilot}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-flowpilot}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before deploying}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-FlowPilot Admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-FLOWPILOT_ACCESS_TOKEN}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      AI_CHAT_MODEL: ollama
      AI_EMBEDDING_MODEL: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      VECTOR_STORE_TABLE: ${VECTOR_STORE_TABLE:-document_chunks_ollama}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-models:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: flowpilot-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  flowpilot_postgres_data:
  flowpilot_ollama_data:
